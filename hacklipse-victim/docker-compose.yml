services:
  # Nginx Reverse Proxy for Subdomain Fuzzing
  nginx-proxy:
    image: nginx:alpine
    container_name: victim-nginx-proxy
    ports:
      - "80:80"     # HTTP proxy port (main entry point)
      - "8090:80"   # Alternative port for testing
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/nginx.conf:ro
      - ./logs:/var/log/nginx
    depends_on:
      - apache-vuln
      - nodejs-vuln
      - log-viewer
    networks:
      - victim-net
    restart: unless-stopped

  # Node.js Express (가벼운 서비스)
  nodejs-vuln:
    image: node:14.15.0-alpine
    container_name: victim-nodejs
    ports:
      - "8085:3000"
    working_dir: /app
    command: >
      sh -c "npm install express@4.16.0 && 
      echo 'const express = require(\"express\"); 
      const app = express(); 
      app.get(\"/\", (req, res) => res.send(\"<h1>Node.js API Server</h1><p>Version: 14.15.0 with Express 4.16.0</p>\")); 
      app.listen(3000);' > app.js && 
      node app.js"
    networks:
      - victim-net
    restart: unless-stopped

  # Apache HTTP Server (가벼운 서비스)
  apache-vuln:
    image: httpd:2.4.49-alpine
    container_name: victim-apache-249
    ports:
      - "8088:80"
    volumes:
      - ./web-content:/usr/local/apache2/htdocs:ro
    networks:
      - victim-net
    restart: unless-stopped

  # 로그 뷰어 (가벼운 서비스)
  log-viewer:
    image: nginx:alpine
    container_name: victim-logs
    ports:
      - "8084:80"
    volumes:
      - ./logs:/usr/share/nginx/html/logs:ro
      - ./log-viewer.html:/usr/share/nginx/html/index.html:ro
    networks:
      - victim-net
    restart: unless-stopped

networks:
  victim-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

volumes:
  victim-data:
  mysql-data:
  postgres-data:
