; Server-Side Template Injection (SSTI) Payloads
; Based on PayloadsAllTheThings SSTI documentation
; Supports: Jinja2, Twig, Smarty, Freemarker, Velocity, Mako, Pebble, Thymeleaf, EJS, Handlebars, etc.

[DEFAULT]
payload = None
rules = None
messages = None

; ===== Universal Detection Payloads =====
; These payloads work across multiple template engines

[detect_polyglot]
payload = ${{<%[%'"}}%\.
rules = error
    Exception
    syntax
messages = Potential SSTI vulnerability detected (polyglot error)
    Potential SSTI vulnerability detected (polyglot error)
    Potential SSTI vulnerability detected (polyglot error)

[detect_math_curly]
payload = {{7*7}}
rules = 49
messages = SSTI vulnerability detected (math evaluation)

[detect_math_curly_nested]
payload = ${{7*7}}
rules = 49
messages = SSTI vulnerability detected (math evaluation)

[detect_math_hash]
payload = #{7*7}
rules = 49
messages = SSTI vulnerability detected (math evaluation)

[detect_math_star]
payload = *{7*7}
rules = 49
messages = SSTI vulnerability detected (math evaluation)

[detect_math_bracket]
payload = [=7*7]
rules = 49
messages = SSTI vulnerability detected (math evaluation)

[detect_math_percent]
payload = <%= 7*7 %>
rules = 49
messages = SSTI vulnerability detected (math evaluation)

[detect_math_dollar]
payload = ${7*7}
rules = 49
messages = SSTI vulnerability detected (math evaluation)

[detect_string_mult]
payload = {{7*'7'}}
rules = 7777777
messages = SSTI vulnerability detected (string multiplication - Jinja2/Twig)

